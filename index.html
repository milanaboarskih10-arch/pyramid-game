<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyramid Game</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#000;
            font-family:'Arial Narrow','Arial',sans-serif;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }
        .page{width:100%;max-width:400px;text-align:center}
        h1{font-size:3rem;margin-bottom:30px;letter-spacing:3px;font-weight:bold}
        h2{font-size:2.5rem;margin-bottom:20px;font-weight:bold}
        input,select{
            width:100%;
            padding:15px;
            margin:10px 0;
            background:#000;
            border:1px solid #fff;
            color:#fff;
            font-size:1.2rem;
            text-align:center;
            font-family:'Arial Narrow','Arial',sans-serif;
            -webkit-appearance:none;
            appearance:none;
        }
        select{
            background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat:no-repeat;
            background-position:right 15px center;
            background-size:20px;
        }
        button{
            width:100%;
            padding:15px;
            margin-top:15px;
            background:#fff;
            color:#000;
            border:none;
            font-size:1.3rem;
            font-weight:bold;
            cursor:pointer;
            letter-spacing:2px;
            font-family:'Arial Narrow','Arial',sans-serif;
        }
        button:disabled{background:#555;color:#999;cursor:not-allowed}
        .hidden{display:none!important}
        .error{color:#ff4444;margin:10px 0;font-size:0.9rem}
        .info{color:#aaa;margin:15px 0;font-size:0.9rem}
        textarea{
            width:100%;
            height:150px;
            background:#000;
            border:1px solid #fff;
            color:#fff;
            padding:10px;
            font-size:1rem;
            margin:10px 0;
            font-family:monospace;
        }
        .small-btn{width:auto;padding:10px 20px;font-size:0.9rem;display:inline-block;margin:5px}
        .creator-link{color:#444;font-size:0.7rem;margin-top:40px;cursor:pointer;text-decoration:underline}

        /* СТИЛИ РЕЗУЛЬТАТОВ */
        .rank-block{
            border:1px solid #fff;
            border-radius:15px;
            padding:20px 15px;
            margin-bottom:20px;
            text-align:left;
        }
        .rank-title{
            font-size:2.5rem;
            font-weight:bold;
            margin-bottom:10px;
            letter-spacing:2px;
        }
        .rank-name{
            font-size:1.3rem;
            padding:5px 0 5px 20px;
            display:block;
        }
        .rank-count{
            color:#aaa;
            font-size:1rem;
            margin-left:8px;
        }
    </style>
</head>
<body>

<div id="loginPage" class="page">
    <h1>PYRAMID GAME</h1>
    <input type="text" id="nameInput" placeholder="Введите ваше имя" autocomplete="off" autofocus>
    <p id="loginError" class="error hidden"></p>
    <button id="nextBtn" disabled>NEXT</button>
    <p class="creator-link" id="showCreator">creator access</p>
    <div id="creatorBox" class="hidden" style="margin-top:10px">
        <input type="password" id="creatorPass" placeholder="Код" style="width:200px;display:inline">
        <button class="small-btn" id="creatorGo" style="display:inline">→</button>
    </div>
</div>

<div id="votePage" class="page hidden">
    <h2>VOTE</h2>
    <p class="info">Выберите 5 разных имён. Нельзя за себя.</p>
    <div id="voteFields"></div>
    <p id="voteError" class="error hidden"></p>
    <button id="confirmBtn">CONFIRM</button>
</div>

<div id="resultPage" class="page hidden">
    <h2 id="resultTitle">Wait for results</h2>
    <div id="resultsBox"></div>
    <p id="timerText" class="info hidden"></p>
    <button class="small-btn" id="logoutBtn" style="margin-top:30px;background:transparent;border:1px solid #333;color:#aaa">Выйти</button>
</div>

<div id="adminPage" class="page hidden">
    <h2>АДМИН</h2>
    <p style="text-align:left;margin-bottom:5px">Список участников:</p>
    <textarea id="adminList"></textarea>
    <button class="small-btn" id="saveList">💾 Сохранить</button>
    <button class="small-btn" id="resetVotes" style="background:#400;color:#f99">🗑 Сброс голосов</button>
    <p id="adminMsg" style="margin-top:10px"></p>
    <button class="small-btn" id="closeAdmin" style="margin-top:20px">← Назад</button>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('pyramid_players') || '["Алиса","Боб","Чарли","Диана","Ева","Фрэнк"]');
    let votes = JSON.parse(localStorage.getItem('pyramid_votes') || '{}');
    let user = null;

    function save(){
        localStorage.setItem('pyramid_players',JSON.stringify(players));
        localStorage.setItem('pyramid_votes',JSON.stringify(votes));
    }

    function show(id){
        document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // ЛОГИН
    var nameInp=document.getElementById('nameInput');
    var nextBtn=document.getElementById('nextBtn');
    var loginErr=document.getElementById('loginError');

    nameInp.addEventListener('input',function(){
        nextBtn.disabled = (nameInp.value.trim().length === 0);
        loginErr.classList.add('hidden');
    });

    nameInp.addEventListener('keydown',function(e){
        if(e.key==='Enter' && !nextBtn.disabled) nextBtn.click();
    });

    nextBtn.addEventListener('click',function(){
        var n=nameInp.value.trim();
        if(!n) return;
        if(!players.includes(n)){loginErr.textContent='Вы не в списке участников';loginErr.classList.remove('hidden');return}
        if(votes[n]){loginErr.textContent='Вы уже проголосовали';loginErr.classList.remove('hidden');return}
        user=n;
        buildVote();
        show('votePage');
    });

    // CREATOR
    document.getElementById('showCreator').addEventListener('click',function(){
        document.getElementById('creatorBox').classList.toggle('hidden');
    });
    document.getElementById('creatorGo').addEventListener('click',function(){
        if(document.getElementById('creatorPass').value==='676901488'){
            buildAdmin();
            show('adminPage');
            document.getElementById('creatorBox').classList.add('hidden');
        }else{alert('Неверный код')}
    });

    // ГОЛОСОВАНИЕ
    function buildVote(){
        var d=document.getElementById('voteFields');
        d.innerHTML='';
        var opts=players.filter(p=>p!==user);
        for(var i=0;i<5;i++){
            var s='<select class="vs"><option value="">-- Выберите --</option>';
            opts.forEach(o=>s+='<option value="'+o+'">'+o+'</option>');
            s+='</select>';
            d.innerHTML+=s;
        }
        document.getElementById('voteError').classList.add('hidden');
    }

    document.getElementById('confirmBtn').addEventListener('click',function(){
        var sels=document.querySelectorAll('.vs');
        var ch=[];
        sels.forEach(s=>ch.push(s.value));
        if(ch.includes('')){document.getElementById('voteError').textContent='Заполните все поля';document.getElementById('voteError').classList.remove('hidden');return}
        if(new Set(ch).size<5){document.getElementById('voteError').textContent='Имена не должны повторяться';document.getElementById('voteError').classList.remove('hidden');return}
        if(ch.includes(user)){document.getElementById('voteError').textContent='Нельзя голосовать за себя';document.getElementById('voteError').classList.remove('hidden');return}
        votes[user]=ch;
        save();
        showResults();
    });

    // РЕЗУЛЬТАТЫ
    function showResults(){
        show('resultPage');
        document.getElementById('resultTitle').textContent='RESULTS';
        document.getElementById('timerText').classList.add('hidden');
        var cnt={};
        players.forEach(p=>cnt[p]=0);
        Object.values(votes).forEach(a=>a.forEach(n=>{if(cnt[n]!==undefined)cnt[n]++}));
        var voters=Object.keys(votes);
        var ranks={A:[],B:[],C:[],D:[],F:[]};
        players.forEach(p=>{
            var c=cnt[p]||0;
            if(c===0||!voters.includes(p))ranks.F.push({n:p,c:c});
            else if(c>=7)ranks.A.push({n:p,c:c});
            else if(c>=5)ranks.B.push({n:p,c:c});
            else if(c>=3)ranks.C.push({n:p,c:c});
            else if(c>=2)ranks.D.push({n:p,c:c});
            else ranks.F.push({n:p,c:c});
        });

        ['A','B','C','D','F'].forEach(r=>ranks[r].sort((a,b)=>b.c-a.c||a.n.localeCompare(b.n)));

        var box=document.getElementById('resultsBox');
        box.innerHTML='';
        ['A','B','C','D','F'].forEach(r=>{
            if(ranks[r].length===0)return;
            var block=document.createElement('div');
            block.className='rank-block';
            var title='<div class="rank-title">'+r+'</div>';
            var names='';
            ranks[r].forEach(e=>{
                names+='<span class="rank-name">'+e.n+' <span class="rank-count">('+e.c+')</span></span>';
            });
            block.innerHTML=title+names;
            box.appendChild(block);
        });
    }

    document.getElementById('logoutBtn').addEventListener('click',function(){
        user=null;nameInp.value='';nextBtn.disabled=true;show('loginPage');
    });

    // АДМИН
    function buildAdmin(){
        document.getElementById('adminList').value=players.join('\n');
        document.getElementById('adminMsg').textContent='';
    }

    document.getElementById('saveList').addEventListener('click',function(){
        players=document.getElementById('adminList').value.split('\n').map(s=>s.trim()).filter(s=>s);
        var nv={};
        Object.entries(votes).forEach(function(e){
            if(players.includes(e[0]) && e[1].every(x=>players.includes(x))) nv[e[0]]=e[1];
        });
        votes=nv;
        save();
        document.getElementById('adminMsg').textContent='✅ Сохранено: '+players.length+' чел.';
        document.getElementById('adminMsg').style.color='#4f4';
    });

    document.getElementById('resetVotes').addEventListener('click',function(){
        if(confirm('Удалить все голоса?')){votes={};save();document.getElementById('adminMsg').textContent='🗑 Голоса сброшены';document.getElementById('adminMsg').style.color='#f90'}
    });

    document.getElementById('closeAdmin').addEventListener('click',function(){show('loginPage')});
</script>
</body>
</html>
