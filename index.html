<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyramid Game</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#000;
            font-family:'Arial Narrow','Arial',sans-serif;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }
        .page{width:100%;max-width:400px;text-align:center}
        h1{font-size:3rem;margin-bottom:30px;letter-spacing:3px;font-weight:bold}
        h2{font-size:2.5rem;margin-bottom:20px;font-weight:bold}
        h3{font-size:1.2rem;margin-bottom:20px;color:#aaa;font-weight:normal}
        input,select{
            width:100%;
            padding:15px;
            margin:10px 0;
            background:#000;
            border:1px solid #fff;
            color:#fff;
            font-size:1.2rem;
            text-align:center;
            font-family:'Arial Narrow','Arial',sans-serif;
            -webkit-appearance:none;
            appearance:none;
        }
        select{
            background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat:no-repeat;
            background-position:right 15px center;
            background-size:20px;
        }
        button{
            width:100%;
            padding:15px;
            margin-top:15px;
            background:#fff;
            color:#000;
            border:none;
            font-size:1.3rem;
            font-weight:bold;
            cursor:pointer;
            letter-spacing:2px;
            font-family:'Arial Narrow','Arial',sans-serif;
        }
        button:disabled{background:#555;color:#999;cursor:not-allowed}
        .hidden{display:none!important}
        .error{color:#ff4444;margin:10px 0;font-size:0.9rem}
        .info{color:#aaa;margin:15px 0;font-size:0.9rem}
        textarea{
            width:100%;
            height:150px;
            background:#000;
            border:1px solid #fff;
            color:#fff;
            padding:10px;
            font-size:1rem;
            margin:10px 0;
            font-family:monospace;
        }
        .small-btn{width:auto;padding:10px 20px;font-size:0.9rem;display:inline-block;margin:5px}
        .creator-link{color:#444;font-size:0.7rem;margin-top:40px;cursor:pointer;text-decoration:underline}

        .rank-block{
            border:1px solid #fff;
            border-radius:15px;
            padding:20px 15px;
            margin-bottom:20px;
            text-align:left;
        }
        .rank-title{font-size:2.5rem;font-weight:bold;margin-bottom:10px;letter-spacing:2px}
        .rank-name{font-size:1.3rem;padding:5px 0 5px 20px;display:block}
        .wait-text{font-size:1.3rem;margin:40px 0;letter-spacing:1px;line-height:1.5}
        .closed-text{font-size:1.3rem;margin:40px 0;letter-spacing:1px;color:#888}
        .loading-text{color:#aaa;font-size:0.9rem;margin:10px 0}
    </style>
</head>
<body>

<div id="loginPage" class="page">
    <h1>PYRAMID GAME</h1>
    <input type="text" id="nameInput" placeholder="Введите ваше имя" autocomplete="off" autofocus>
    <p id="loginError" class="error hidden"></p>
    <p id="loginLoading" class="loading-text hidden">Загрузка...</p>
    <button id="nextBtn" disabled>NEXT</button>
    <p class="creator-link" id="showCreator">creator access</p>
    <div id="creatorBox" class="hidden" style="margin-top:10px">
        <input type="password" id="creatorPass" placeholder="Код" style="width:200px;display:inline">
        <button class="small-btn" id="creatorGo" style="display:inline">→</button>
    </div>
</div>

<div id="votePage" class="page hidden">
    <h2>VOTE</h2>
    <p class="info">Выберите 5 разных имён. Нельзя за себя.</p>
    <div id="voteFields"></div>
    <p id="voteError" class="error hidden"></p>
    <button id="confirmBtn">CONFIRM</button>
</div>

<div id="resultPage" class="page hidden">
    <h2 id="resultTitle"></h2>
    <h3 id="resultSubtitle" class="hidden"></h3>
    <div id="resultsBox"></div>
    <p id="waitMsg" class="wait-text hidden">Voting is not yet complete.<br>Please wait for the results after the voting is over.</p>
    <p id="closedMsg" class="closed-text hidden">Voting is closed.<br>Please wait until Thursday.</p>
    <button class="small-btn" id="logoutBtn" style="margin-top:30px;background:transparent;border:1px solid #333;color:#aaa">Выйти</button>
</div>

<div id="adminPage" class="page hidden">
    <h2>АДМИН</h2>
    <p style="text-align:left;margin-bottom:5px">Список участников:</p>
    <textarea id="adminList"></textarea>
    <button class="small-btn" id="saveList">💾 Сохранить</button>
    <button class="small-btn" id="resetVotes" style="background:#400;color:#f99">🗑 Сброс голосов</button>
    <p id="adminMsg" style="margin-top:10px"></p>
    <button class="small-btn" id="closeAdmin" style="margin-top:20px">← Назад</button>
</div>

<script>
    // НАСТРОЙКИ JSONBIN
    var BIN_ID = "6a50fe32da38895dfe4b7c28";
    var API_KEY = "$2a$10$wNB0SDtizr5Av3xx4e6BNeIDc1hUnDhRW5T4VEDRVzFU1/jMcdJwG";
    var API_URL = "https://api.jsonbin.io/v3/b/" + BIN_ID;
    var HEADERS = {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY
    };

    var GAME_NUMBER = 4;
    var START_DAY = 4, START_HOUR = 12;
    var END_DAY = 5, END_HOUR = 14;
    var RESULTS_END_DAY = 1, RESULTS_END_HOUR = 0;

    var FIXED_RESULTS = {
        A: ['Сольюн', 'Минджи', 'София', 'Ынджон'],
        B: ['Суджи', 'Джеи', 'Юнджин', 'Винтер', 'Вонхи', 'Со До А'],
        C: ['Па Гю Ён', 'Ли Ю Ми', 'Сондже'],
        D: ['Чон Хо Ён'],
        F: ['Ким Ён Ха']
    };

    var players = [];
    var votes = {};
    var user = null;

    // ЗАГРУЗКА С СЕРВЕРА
    async function loadFromServer(){
        try {
            var resp = await fetch(API_URL + '/latest', { headers: HEADERS });
            if(!resp.ok) throw new Error('Ошибка');
            var data = await resp.json();
            players = data.record.players || [];
            votes = data.record.votes || {};
            return true;
        } catch(e) {
            console.error(e);
            return false;
        }
    }

    async function saveToServer(){
        try {
            var resp = await fetch(API_URL, {
                method: 'PUT',
                headers: HEADERS,
                body: JSON.stringify({ players: players, votes: votes })
            });
            return resp.ok;
        } catch(e) {
            return false;
        }
    }

    function show(id){
        document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function getMSK(){
        var now = new Date();
        return new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (3 * 3600000));
    }

    function isVotingOpen(){
        var msk = getMSK();
        var d = msk.getDay(), h = msk.getHours();
        if(d === START_DAY && h >= START_HOUR) return true;
        if(d === END_DAY && h < END_HOUR) return true;
        return false;
    }

    function isResultsVisible(){
        var msk = getMSK();
        var d = msk.getDay(), h = msk.getHours();
        if(d === END_DAY && h >= END_HOUR) return true;
        if(d === 6 || d === 0) return true;
        if(d === RESULTS_END_DAY && h < RESULTS_END_HOUR) return true;
        return false;
    }

    function isClosed(){
        return !isVotingOpen() && !isResultsVisible();
    }

    // ЛОГИН
    var nameInp = document.getElementById('nameInput');
    var nextBtn = document.getElementById('nextBtn');
    var loginErr = document.getElementById('loginError');
    var loginLoad = document.getElementById('loginLoading');

    nameInp.addEventListener('input', function(){
        nextBtn.disabled = (nameInp.value.trim().length === 0);
        loginErr.classList.add('hidden');
    });

    nameInp.addEventListener('keydown', function(e){
        if(e.key === 'Enter' && !nextBtn.disabled) nextBtn.click();
    });

    nextBtn.addEventListener('click', async function(){
        var n = nameInp.value.trim();
        if(!n) return;

        loginErr.classList.add('hidden');
        loginLoad.classList.remove('hidden');
        nextBtn.disabled = true;

        var ok = await loadFromServer();
        loginLoad.classList.add('hidden');
        nextBtn.disabled = false;

        if(!ok){
            loginErr.textContent = 'Ошибка соединения. Попробуйте позже.';
            loginErr.classList.remove('hidden');
            return;
        }

        if(!players.includes(n)){
            loginErr.textContent = 'Вы не в списке участников';
            loginErr.classList.remove('hidden');
            return;
        }

        if(isClosed()){
            loginErr.textContent = 'Voting is closed. Please wait until Thursday.';
            loginErr.classList.remove('hidden');
            return;
        }

        if(isResultsVisible()){
            user = n;
            showResultsPage();
            return;
        }

        if(votes[n]){
            loginErr.textContent = 'Вы уже проголосовали';
            loginErr.classList.remove('hidden');
            return;
        }

        user = n;
        buildVote();
        show('votePage');
    });

    // CREATOR
    document.getElementById('showCreator').addEventListener('click', function(){
        document.getElementById('creatorBox').classList.toggle('hidden');
    });
    document.getElementById('creatorGo').addEventListener('click', async function(){
        if(document.getElementById('creatorPass').value === '676901488'){
            var ok = await loadFromServer();
            if(!ok) { alert('Ошибка соединения'); return; }
            buildAdmin();
            show('adminPage');
            document.getElementById('creatorBox').classList.add('hidden');
        } else {
            alert('Неверный код');
        }
    });

    // ГОЛОСОВАНИЕ
    function buildVote(){
        var d = document.getElementById('voteFields');
        d.innerHTML = '';
        var opts = players.filter(p => p !== user);
        for(var i = 0; i < 5; i++){
            var s = '<select class="vs"><option value="">-- Выберите --</option>';
            opts.forEach(o => s += '<option value="' + o + '">' + o + '</option>');
            s += '</select>';
            d.innerHTML += s;
        }
        document.getElementById('voteError').classList.add('hidden');
    }

    document.getElementById('confirmBtn').addEventListener('click', async function(){
        var sels = document.querySelectorAll('.vs');
        var ch = [];
        sels.forEach(s => ch.push(s.value));
        if(ch.includes('')){
            document.getElementById('voteError').textContent = 'Заполните все поля';
            document.getElementById('voteError').classList.remove('hidden');
            return;
        }
        if(new Set(ch).size < 5){
            document.getElementById('voteError').textContent = 'Имена не должны повторяться';
            document.getElementById('voteError').classList.remove('hidden');
            return;
        }
        if(ch.includes(user)){
            document.getElementById('voteError').textContent = 'Нельзя голосовать за себя';
            document.getElementById('voteError').classList.remove('hidden');
            return;
        }

        // Загружаем свежие данные перед сохранением
        await loadFromServer();
        if(votes[user]){
            document.getElementById('voteError').textContent = 'Вы уже проголосовали';
            document.getElementById('voteError').classList.remove('hidden');
            return;
        }

        votes[user] = ch;
        var saved = await saveToServer();
        if(!saved){
            document.getElementById('voteError').textContent = 'Ошибка сохранения';
            document.getElementById('voteError').classList.remove('hidden');
            return;
        }
        showWaitPage();
    });

    function showWaitPage(){
        show('resultPage');
        document.getElementById('resultTitle').textContent = '';
        document.getElementById('resultSubtitle').classList.add('hidden');
        document.getElementById('resultsBox').innerHTML = '';
        document.getElementById('resultsBox').classList.add('hidden');
        document.getElementById('waitMsg').classList.remove('hidden');
        document.getElementById('closedMsg').classList.add('hidden');
    }

    function showResultsPage(){
        show('resultPage');
        document.getElementById('resultTitle').textContent = 'RESULTS';
        document.getElementById('resultSubtitle').textContent = 'Results of the ' + GAME_NUMBER + 'th game of pyramid';
        document.getElementById('resultSubtitle').classList.remove('hidden');
        document.getElementById('resultsBox').classList.remove('hidden');
        document.getElementById('waitMsg').classList.add('hidden');
        document.getElementById('closedMsg').classList.add('hidden');

        var box = document.getElementById('resultsBox');
        box.innerHTML = '';
        ['A','B','C','D','F'].forEach(function(rank){
            var names = FIXED_RESULTS[rank];
            if(!names || names.length === 0) return;
            var block = document.createElement('div');
            block.className = 'rank-block';
            block.innerHTML = '<div class="rank-title">' + rank + '</div>';
            names.forEach(function(name){
                block.innerHTML += '<span class="rank-name">' + name + '</span>';
            });
            box.appendChild(block);
        });
    }

    document.getElementById('logoutBtn').addEventListener('click', function(){
        user = null;
        nameInp.value = '';
        nextBtn.disabled = true;
        show('loginPage');
    });

    // АДМИН
    function buildAdmin(){
        document.getElementById('adminList').value = players.join('\n');
        document.getElementById('adminMsg').textContent = '';
    }

    document.getElementById('saveList').addEventListener('click', async function(){
        players = document.getElementById('adminList').value.split('\n').map(s => s.trim()).filter(s => s);
        var nv = {};
        Object.entries(votes).forEach(function(e){
            if(players.includes(e[0]) && e[1].every(x => players.includes(x))) nv[e[0]] = e[1];
        });
        votes = nv;
        var saved = await saveToServer();
        if(saved){
            document.getElementById('adminMsg').textContent = '✅ Сохранено: ' + players.length + ' чел.';
            document.getElementById('adminMsg').style.color = '#4f4';
        } else {
            document.getElementById('adminMsg').textContent = '❌ Ошибка сохранения';
            document.getElementById('adminMsg').style.color = '#f44';
        }
    });

    document.getElementById('resetVotes').addEventListener('click', async function(){
        if(confirm('Удалить все голоса?')){
            votes = {};
            var saved = await saveToServer();
            if(saved){
                document.getElementById('adminMsg').textContent = '🗑 Голоса сброшены';
                document.getElementById('adminMsg').style.color = '#f90';
            } else {
                document.getElementById('adminMsg').textContent = '❌ Ошибка';
                document.getElementById('adminMsg').style.color = '#f44';
            }
        }
    });

    document.getElementById('closeAdmin').addEventListener('click', function(){ show('loginPage'); });
</script>
</body>
</html>
